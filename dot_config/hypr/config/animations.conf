# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = yes
    
    # 贝塞尔曲线定义
    # 格式: bezier = name, x1, y1, x2, y2
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    
    # 窗口动画
    # 格式: animation = name, onoff, speed, curve, style
    animation = windows, 1, 5, overshot, slide
    animation = windowsIn, 1, 4, smoothIn, popin
    animation = windowsOut, 1, 5, smoothOut, popin
    animation = windowsMove, 1, 4, default, slide
    
    # 边框动画
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    
    # 淡入淡出动画
    animation = fade, 1, 5, smoothIn
    animation = fadeIn, 1, 5, smoothIn
    animation = fadeOut, 1, 5, smoothOut
    animation = fadeSwitch, 1, 5, default
    animation = fadeShadow, 1, 5, default
    animation = fadeDim, 1, 5, default
    
    # 工作区动画
    animation = workspaces, 1, 6, overshot, slide
    animation = workspacesIn, 1, 6, overshot, slide
    animation = workspacesOut, 1, 6, overshot, slidefade 80%
    animation = specialWorkspace, 1, 6, overshot, slidefadevert
    
    # 图层规则动画（在 windowrules.conf 中定义）
    # layerrule = animation fade, waybar
}

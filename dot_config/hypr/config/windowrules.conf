# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# 强制某些应用始终浮动 (已在 General Window Rules 中定义部分)
windowrule = float, class:^(pavucontrol)$

# 禁止某些应用获得焦点
windowrule = nofocus, class:^(xclipboard|xfce4-notifyd)$

# 全屏应用
windowrule = fullscreen, class:^(mpv|vlc)$, title:.*(全屏).*

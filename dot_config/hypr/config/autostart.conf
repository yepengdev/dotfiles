# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                  Autostart Configuration                      ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# Wallpaper
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/wall.sh

# System UI components
exec-once = ~/.config/waybar/launch-waybar.sh
exec-once = mako
exec-once = nm-applet --indicator
# exec-once = blueman-applet
# exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/libexec/hyprpolkitagent
exec-once = foot --server

# Input method
exec-once = fcitx5 -d

# Audio visualizer
exec-once = bash -c "mkfifo /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob && tail -f /tmp/$HYPRLAND_INSTANCE_SIGNATURE.wob | wob & disown" &

# Environment setup
exec-once = systemctl --user import-environment
exec-once = systemctl --user import-environment --all
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# Desktop portal
exec-once = ~/.config/hypr/xdg-portal-hyprland

# Idle handler
exec-once = $idlehandler

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# exec-once = ~/clash/cfw
exec-once = ~/v2rayN/v2rayN

# Emacs daemon
exec-once = emacs --daemon

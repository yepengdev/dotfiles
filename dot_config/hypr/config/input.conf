# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
    # 鼠标跟随
    follow_mouse = 1
    
    # 鼠标灵敏度
    sensitivity = 0.6
    
    # 键盘重复设置
    repeat_delay = 300
    repeat_rate = 50
    
    # 加速曲线
    accel_profile = flat
    
    # 强制无加速
    force_no_accel = false
    
    # 左手法则
    left_handed = false
    
    # 触摸板设置
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = false
        middle_button_emulation = true
        tap-to-click = true
        tap-and-drag = true
        drag_lock = false
    }
    
    # 触摸设备
    touchdevice {
        transform = 0
        output = 
        enabled = true
    }
    
    # 平板设备
    tablet {
        transform = 0
        output = 
        relative_input = true
    }
    
    # 特殊键盘按键
    kb_options = 
    kb_model = 
    kb_layout = 
    kb_variant = 
    kb_rules = 
    
    # 数字键盘
    numlock_by_default = false
    
    # 鼠标按键
    mouse_refocus = true
}

# 特定设备配置
device {
    name = alpsps/2-alps-glidepoint
    enabled = true
    # 可以添加更多设备特定设置
    accel_profile = flat
    sensitivity = 0.5
}

# 字体设置
font_family Monaspace Neon
symbol_map U+4E00-U+9FFF,U+3000-U+303F,U+FF00-U+FFEF WenQuanYi Micro Hei 
font_size 11.0
bold_font auto
italic_font auto
bold_italic_font auto

# 窗口设置
window_padding_width 5
window_margin_width 0
single_window_margin_width 0
window_border_width 0.5pt
window_rounded_corners 0
background_opacity 0.8
dynamic_background_opacity yes
background_blur 0

# 滚动设置
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER -S
wheel_scroll_multiplier 5.0

# Catppuccin Mocha 主题
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# 光标设置
cursor                  #f5e0dc
cursor_text_color       #1e1e2e
cursor_shape block
cursor_blink_interval -1
cursor_stop_blinking_after 15.0

# URL 和超链接
url_color               #f5e0dc
url_style curly
open_url_with default
url_prefixes http https file ftp
detect_urls yes

# 性能优化
repaint_delay 10
input_delay 3
sync_to_monitor yes

# 键盘快捷键
# 新建窗口
map ctrl+shift+enter new_window

# 新建标签页
map ctrl+shift+t new_tab

# 关闭标签页
map ctrl+shift+q close_tab

# 切换标签页
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# 移动标签页
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward

# 调整字体大小
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# 复制粘贴
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# 滚动
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end

# 选择文本
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# 其他
map ctrl+shift+f11 toggle_fullscreen
map ctrl+shift+f10 toggle_maximized
map ctrl+shift+f5 load_config_file
map ctrl+shift+f6 debug_config

# 启用鼠标
mouse_hide_wait 3.0
# 终端铃声
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab yes

# 窗口标题
window_title_format {title}
tab_title_template {title}
active_tab_title_template {title}

# 滚动条颜色
scrollbar_handle_color  #9399b2
scrollbar_track_color   #45475a

# 窗口边框颜色
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# 标签栏颜色
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# 标记颜色
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec


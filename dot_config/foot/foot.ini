# Foot Terminal Configuration
# Theme: Catppuccin Mocha

shell=fish
term=xterm-256color
title=foot

# Font
font=MonaspiceNe Nerd Font Mono:size=9
dpi-aware=yes
underline-thickness=1
box-drawings-uses-font-glyphs=yes

# Window
pad=25x25
resize-delay-ms=100
initial-window-size-chars=80x24

# Cursor
[cursor]
style=beam
blink=yes

# Scrollback
[scrollback]
lines=100000
multiplier=3.0
indicator-position=relative

# Colors - Catppuccin Mocha
[colors]
alpha=0.8
background=1e1e2e
foreground=cdd6f4
cursor=11111b f5e0dc

regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=f5c2e7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=f5c2e7
bright6=94e2d5
bright7=a6adc8

selection-background=414356
selection-foreground=cdd6f4

urls=89b4fa

# Key Bindings
[key-bindings]
scrollback-up-page=Page_Up Shift+Page_Up
scrollback-down-page=Page_Down Shift+Page_Down
scrollback-up-half-page=none
scrollback-down-half-page=none
scrollback-up-line=Control+Shift+Up
scrollback-down-line=Control+Shift+Down
clipboard-copy=Control+Shift+c Control+Alt+c
clipboard-paste=Control+Shift+v Control+Alt+v
primary-paste=Shift+Insert
search-start=Control+Shift+f
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
fullscreen=F11
maximize=Control+Shift+m
minimize=Control+Shift+h
quit=Control+Shift+q

# Search Bindings
[search-bindings]
cancel=Escape Control+g
find-prev=Shift+F3
find-next=F3 Control+G
delete-prev-word=Control+BackSpace

# Mouse Bindings
[mouse-bindings]
selection-override-modifiers=Shift

# Text Bindings
[text-bindings]
\x03=Control+c
\x04=Control+d
\x15=Control+u
\x17=Control+w
